# @format

chat:
  quick_prompts:
    web-search:
      - "Tell me about Agno's AgentOS"
      - "What's the latest research from Anthropic?"
      - "Search for OpenAI's latest model release"
    code-search:
      - "What agents are available in this project?"
      - "How does the database connection work?"
      - "Walk me through the main entry point"
    engineering-leadership: # ← new
      - "Review the architecture of this project"
      - "Plan a migration to a new database driver"
      - "What are the technical risks in our current setup?"
    agno-support-agent:
      - "How do I add a new tool to an agent?"
      - "What's the difference between a team and a workflow?"
      - "How does session storage work?"
    project-manager:
      - "What are the key risks in our current project timeline?"
      - "Help me prioritize these features for the next sprint"
      - "What industry trends should we be aware of?"
    technical-lead:
      - "Review the architecture of this project"
      - "What design patterns are used in the codebase?"
      - "How does the database connection work?"
