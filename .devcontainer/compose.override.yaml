services:
  # The IDE host — keep alive so Codespaces can attach to it.
  # The API (zeroteam-api) runs as a separate service via postStartCommand.
  zeroteam-api:
    command: /bin/sh -c "while sleep 1000; do :; done"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
    volumes:
      - ..:/workspace:cached

  zeroteam-db:
    ports:
      - "5432:5432"